services:
  backend:
    build: .
    container_name: ipnext_backend
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8288}:8288"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --post-data='{}' --header='Content-Type:application/json' http://localhost:8288/api/v1/auth/login; exit 0"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
