services:
  mysql:
    image: mysql:8.0
    container_name: ipnext_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-ipnext_admin}
      MYSQL_USER: ${DB_USER:-ipnext}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: ipnext_backend
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8288}:8288"
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
